# ========================================
# Docker Compose for Development
# ========================================
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  # ========================================
  # Development Application
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: anime-stream-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://animeverse:animeverse@postgres:5432/animeverse_dev
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_WS_URL=ws://localhost:3000
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_PASSWORD=admin
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - anime-stream-dev-network
    command: npm run dev
    depends_on:
      - postgres
      - redis

  # ========================================
  # PostgreSQL for Development
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: anime-stream-dev-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=animeverse
      - POSTGRES_PASSWORD=animeverse
      - POSTGRES_DB=animeverse_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - anime-stream-dev-network

  # ========================================
  # Redis for Development
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: anime-stream-dev-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - anime-stream-dev-network

networks:
  anime-stream-dev-network:
    driver: bridge

volumes:
  postgres-dev-data:
    driver: local
  redis-dev-data:
    driver: local
